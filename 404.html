<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404</title>
    <link rel="stylesheet" href="stylesheets/style.css" />
    <link rel="icon" href="images/icon.png" type="images/png" />
    <link rel="icon" href="images/icon.ico" type="images/x-icon" />

    <script defer src="javascripts/scripts.js"></script>
  </head>

  <body>
    <main class="screen">
      <div class="corner-letter left-top">к</div>
      <div class="corner-letter right-top">у</div>
      <div class="corner-letter left-bottom">д</div>
      <div class="corner-letter right-bottom">а</div>

      <div class="degree top-left-degree">90°W</div>
      <div class="degree top-right-degree">90°E</div>

      <div class="degree left-north">90°N</div>
      <div class="degree right-north">90°N</div>

      <div class="degree left-south">90°S</div>
      <div class="degree right-south">90°S</div>

      <div class="degree bottom-left-degree">90°W</div>
      <div class="degree bottom-right-degree">90°E</div>

      <section class="coords">
        <span>55°.74’98.82” N</span>
        <span>37°.61’78.94” E.</span>
      </section>

      <div class="not-found">Страница не найдена</div>

      <div class="message">
        Страница, которую вы ищете, не найдена.<br />
        Возможно, она уже отправилась в путешествие.
      </div>

      <div class="email">kuda@mail.ru</div>
    </main>
  </body>
</html>
